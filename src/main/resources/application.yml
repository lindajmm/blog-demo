spring:
  datasource:
    #url: jdbc:mysql://192.168.5.101:3306/blog_demo?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    url: jdbc:mysql://192.168.5.101:3306/blog_demo?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&useUnicode=true&characterEncoding=utf8&autoReconnect=true
    username: hostonly_user
    password: 123456  # 改成你自己的数据库密码
    driver-class-name: com.mysql.cj.jdbc.Driver

# MyBatis 配置
mybatis:
  mapper-locations: classpath:mapper/*.xml  # mapper.xml文件位置
  type-aliases-package: com.example.blog_demo.entity  # 实体类别名包
  configuration:
    map-underscore-to-camel-case: true  # 开启驼峰命名自动映射

# 日志配置（方便查看SQL）
logging:
  level:
    com.example.blog_demo.mapper: debug  # 打印SQL日志